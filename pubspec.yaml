name: ritual_booking_trionova
description: "Vedic ritual booking management app for pandits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  pinput: ^3.0.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5B0FA8"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/json/
    - assets/images/
